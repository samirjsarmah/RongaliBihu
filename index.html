<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rongali Bihu</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Grandstander:wght@400;700;900&family=Noto+Serif+Bengali:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&family=Cinzel+Decorative:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <canvas id="confettiCanvas"></canvas>
  <div class="bg-overlay"></div>

  <!-- Floating petals -->
  <div class="floaties" aria-hidden="true">
    <span class="floaty" style="--x:5%;--d:0s;--s:1.1">🌸</span>
    <span class="floaty" style="--x:15%;--d:1.2s;--s:0.9">🎋</span>
    <span class="floaty" style="--x:28%;--d:0.5s;--s:1.3">🌺</span>
    <span class="floaty" style="--x:42%;--d:2s;--s:0.8">🌼</span>
    <span class="floaty" style="--x:58%;--d:0.8s;--s:1.0">🌸</span>
    <span class="floaty" style="--x:72%;--d:1.5s;--s:1.2">🎋</span>
    <span class="floaty" style="--x:85%;--d:0.3s;--s:0.95">🌺</span>
    <span class="floaty" style="--x:95%;--d:2.5s;--s:1.05">🌼</span>
  </div>

  <!-- Gamusa Top Border -->
  <div class="gamusa-top" aria-hidden="true">
    <svg viewBox="0 0 1200 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="gamusaPat" x="0" y="0" width="40" height="60" patternUnits="userSpaceOnUse">
          <rect width="40" height="60" fill="#b03020"/>
          <rect y="5"  width="40" height="3" fill="rgba(255,255,255,0.3)"/>
          <rect y="26" width="40" height="3" fill="rgba(255,255,255,0.3)"/>
          <rect y="47" width="40" height="3" fill="rgba(255,255,255,0.3)"/>
          <polygon points="20,10 28,20 20,30 12,20" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
          <polygon points="20,31 28,41 20,51 12,41" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
          <circle cx="20" cy="20" r="2.5" fill="white"/>
          <circle cx="20" cy="41" r="2.5" fill="white"/>
        </pattern>
      </defs>
      <rect width="1200" height="60" fill="url(#gamusaPat)"/>
    </svg>
  </div>

  <!-- MAIN CARD -->
  <main class="card" id="mainCard">

    <header class="card-header">
      <div class="header-stars">✦ ✦ ✦</div>
      <p class="assamese-subtitle">বিহুৰ ওলগ জনাইছোঁ</p>
      <h1 class="title">Rongali Bihu</h1>
      <p class="assamese-tagline">ৰঙালী বিহুৰ শুভেচ্ছা</p>
      <div class="day-badge-wrap">
        <p class="day-badge" id="dayBadge">🌸 Detecting Bihu Day…</p>
      </div>
    </header>

    <!-- Sound hint -->
    <p class="sound-hint">Tap the instruments to hear them!</p>

    <!-- Cultural Icons Row — CLICKABLE with SOUND -->
    <div class="icons-row" aria-label="Traditional Assamese instruments - click to play sounds">

      

      <button class="icon-item" id="icon-dhol" onclick="playSound('dhol')" title="Click to hear the Dhol!" aria-label="Dhol - click to play sound">
        <div class="icon-glow dhol-glow"></div>
        <div class="icon-img-wrap">
          <img class="cult-icon" src="dhol.png" alt="Dhol" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
          <div class="icon-fallback" style="display:none">🥁</div>
          <audio id="dholSound" src="dholSound.mp3" preload="auto"></audio>
        </div>
        <span class="icon-label">Dhol</span>
        <span class="icon-sublabel">ঢোল</span>
        <span class="sound-ripple" id="ripple-dhol"></span>
      </button>

      <button class="icon-item" id="icon-pepa" onclick="playSound('pepa')" title="Click to hear the Pepa!" aria-label="Pepa - click to play sound">
        <div class="icon-glow pepa-glow"></div>
        <div class="icon-img-wrap">
          <img class="cult-icon" src="pepa.png" alt="Pepa" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
          <div class="icon-fallback" style="display:none">🎵</div>
          <audio id="pepaSound" src="pepaSound.mp3" preload="auto"></audio>
        </div>
        <span class="icon-label">Pepa</span>
        <span class="icon-sublabel">পেঁপা</span>
        <span class="sound-ripple" id="ripple-pepa"></span>
      </button>

      <button class="icon-item" id="icon-japi" onclick="playSound('japi')" title="Click to hear a jingle!" aria-label="Jaapi - click to play sound">
        <div class="icon-glow japi-glow"></div>
        <div class="icon-img-wrap">
          <img class="cult-icon" src="Gogona.png" alt="Jaapi" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
          <div class="icon-fallback" style="display:none">🎩</div>
           <audio id="japiSound" src="gogona.mp3" preload="auto"></audio>
        </div>
        <span class="icon-label">Gogona</span>
        <span class="icon-sublabel">গগনা</span>
        <span class="sound-ripple" id="ripple-japi"></span>
      </button>

      <button class="icon-item" id="icon-gamusa" onclick="playSound('gamusa')" title="Click to wave the Gamusa!" aria-label="Gamusa - click to play sound">
        <div class="icon-glow gamusa-glow"></div>
        <div class="icon-img-wrap">
          <img class="cult-icon" src="flute.png" alt="Gamusa" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
          <div class="icon-fallback" style="display:none">🧣</div>
           <audio id="gamusaSound" src="flute.mp3" preload="auto"></audio>
        </div>
        <span class="icon-label">Flute</span>
        <span class="icon-sublabel">বাঁহী</span>
        <span class="sound-ripple" id="ripple-gamusa"></span>
      </button>

    </div>

    <!-- Decorative divider -->
    <div class="ornamental-divider">
      <span></span><span class="diamond">◆</span><span></span>
    </div>

    <!-- Input form -->
    <section class="form-section">
      <div class="input-row">
        <input
          type="text"
          id="userName"
          placeholder="Enter Your Name"
          maxlength="40"
          autocomplete="off"
          onkeydown="if(event.key==='Enter') generateWish()"
        />
        <button id="generateBtn" onclick="generateWish()">
          <span class="btn-text">Let's Go</span>
          <span class="btn-shimmer"></span>
        </button>
      </div>
    </section>

    <!-- Wish Output -->
    <section class="wish-section" id="wishSection" aria-live="polite">
      <div class="wish-card" id="wishCard">
        <div class="wish-ornament top-orn">✦</div>
        <p class="wish-assamese" id="wishAssamese"></p>
        <div class="wish-divider-wrap"><hr class="wish-divider"/></div>
        <p class="wish-english"  id="wishEnglish"></p>
        <p class="wish-from"    id="wishFrom"></p>
        <div class="wish-ornament bot-orn">✦</div>
        <button class="share-btn" id="shareBtn" onclick="copyWish()" style="display:none">
          📋 Copy & Share
        </button>
        <p class="copy-toast" id="copyToast">✅ Copied!</p>
      </div>
    </section>

    <footer class="dev-footer">
      Crafted with ❤️ by 
      <a href="https://samirjsarmah.vercel.app/" target="_blank" rel="noopener">Samir J Sarmah</a>
    </footer>

  </main>

  <!-- Gamusa Bottom Border -->
  <div class="gamusa-bottom" aria-hidden="true">
    <svg viewBox="0 0 1200 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="60" fill="url(#gamusaPat)"/>
    </svg>
  </div>

  <!-- Music -->


  <audio id="bihusong" loop preload="auto">
    <source src="bihu.mp3" type="audio/mpeg">
  </audio>

  <button class="calendar-btn" onclick="openCalendar()">📅 অসমীয়া কেলেণ্ডাৰ</button>

  <script src="script.js"></script>
</body>
</html>
