<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rongali Bihu</title>

  <!-- Google Fonts: Tiro Devanagari + Cinzel for festive feel -->


  <link href="https://fonts.googleapis.com/css2?family=Grandstander:ital,wght@0,100..900;1,100..900&family=Noto+Serif+Bengali:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Sixtyfour+Convergence&family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">


  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Forum&display=swap" rel="stylesheet">



  <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Tiro+Bangla&display=swap" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Sanskrit:ital@0;1&family=Cinzel+Decorative:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ════════════════ CANVAS for confetti ════════════════ -->
  <canvas id="confettiCanvas"></canvas>

  <!-- ════════════════ BACKGROUND DECORATIONS ════════════════ -->
  <div class="bg-overlay"></div>

  <!-- Floating festive icons -->
  <div class="floaties" aria-hidden="true">
    <span class="floaty" style="--x:8%;--d:0s;--s:1.1">🌸</span>
    <span class="floaty" style="--x:20%;--d:1.2s;--s:0.9">🎋</span>
    <span class="floaty" style="--x:35%;--d:0.5s;--s:1.3">🌺</span>
    <span class="floaty" style="--x:50%;--d:2s;--s:0.8">🌼</span>
    <span class="floaty" style="--x:65%;--d:0.8s;--s:1.0">🌸</span>
    <span class="floaty" style="--x:78%;--d:1.5s;--s:1.2">🎋</span>
    <span class="floaty" style="--x:90%;--d:0.3s;--s:0.95">🌺</span>
  </div>

  <!-- ════════════════ GAMUSA BORDER TOP ════════════════ -->
  <div class="gamusa-top" aria-hidden="true">
    <svg viewBox="0 0 1200 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Gamusa weave pattern: repeating diamond + line motif -->
      <defs>
        <pattern id="gamusaPat" x="0" y="0" width="40" height="60" patternUnits="userSpaceOnUse">
          <rect width="40" height="60" fill="#c0392b"/>
          <!-- horizontal white stripes -->
          <rect y="5"  width="40" height="3" fill="rgba(255,255,255,0.35)"/>
          <rect y="26" width="40" height="3" fill="rgba(255,255,255,0.35)"/>
          <rect y="47" width="40" height="3" fill="rgba(255,255,255,0.35)"/>
          <!-- diamond -->
          <polygon points="20,10 28,20 20,30 12,20" fill="none" stroke="white" stroke-width="1.5"/>
          <polygon points="20,31 28,41 20,51 12,41" fill="none" stroke="white" stroke-width="1.5"/>
          <!-- centre dots -->
          <circle cx="20" cy="20" r="2" fill="white"/>
          <circle cx="20" cy="41" r="2" fill="white"/>
        </pattern>
      </defs>
      <rect width="1200" height="60" fill="url(#gamusaPat)"/>
    </svg>
  </div>

  <!-- ════════════════ MAIN CARD ════════════════ -->
  <main class="card" id="mainCard">

    <!-- Header -->
    
    <header class="card-header">
  <p class="assamese-subtitle" style="font-family: 'Noto Serif Bengali', serif;">
    বিহুৰ ওলগ
  </p>
  <h1 class="title">Rongali Bihu</h1>
  <p class="day-badge" id="dayBadge">🌸 Detecting Bihu Day…</p>
</header>

    <!-- Cultural icons row -->
    <div class="icons-row" aria-label="Traditional Assamese elements">
      <div class="icon-item" title="Dhol">
        <!-- Dhol SVG -->
        <img class="cult-icon" viewBox="0 0 80 50" src="dhol.png">
          <ellipse cx="10" cy="25" rx="9" ry="18" fill="#8B4513" stroke="#c0392b" stroke-width="2"/>
          <rect x="10" y="7" width="60" height="36" rx="4" fill="#a0522d" stroke="#c0392b" stroke-width="2"/>
          <ellipse cx="70" cy="25" rx="9" ry="18" fill="#8B4513" stroke="#c0392b" stroke-width="2"/>
          <!-- strings -->
          <line x1="10" y1="12" x2="70" y2="12" stroke="#f5deb3" stroke-width="1.5" stroke-dasharray="4,3"/>
          <line x1="10" y1="38" x2="70" y2="38" stroke="#f5deb3" stroke-width="1.5" stroke-dasharray="4,3"/>
        </svg>
        <span>Dhol</span>
      </div>

      <div class="icon-item" title="Pepa">
        <!-- Pepa (buffalo horn flute) SVG -->
         <img class="cult-icon" viewBox="0 0 80 50" src="pepa.png">
          <path d="M5,42 Q20,10 75,8" stroke="#8B4513" stroke-width="6" fill="none" stroke-linecap="round"/>
          <ellipse cx="75" cy="9" rx="5" ry="8" fill="#c0392b"/>
          <!-- finger holes -->
          <circle cx="30" cy="27" r="2.5" fill="#5c2a0a"/>
          <circle cx="42" cy="21" r="2.5" fill="#5c2a0a"/>
          <circle cx="54" cy="16" r="2.5" fill="#5c2a0a"/>
        </svg>
        <span>Pepa</span>
      </div>

      <div class="icon-item" title="Jaapi">
        <!-- Jaapi (conical hat) SVG -->
        <img class="cult-icon" viewBox="0 0 80 50" src="japi-removebg-preview.png">
          <polygon points="40,5 5,52 75,52" fill="#c8a84b" stroke="#8B4513" stroke-width="2"/>
          <!-- weave lines -->
          <line x1="40" y1="5" x2="5"  y2="52" stroke="#8B4513" stroke-width="0.8" opacity="0.5"/>
          <line x1="40" y1="5" x2="20" y2="52" stroke="#8B4513" stroke-width="0.8" opacity="0.5"/>
          <line x1="40" y1="5" x2="35" y2="52" stroke="#8B4513" stroke-width="0.8" opacity="0.5"/>
          <line x1="40" y1="5" x2="50" y2="52" stroke="#8B4513" stroke-width="0.8" opacity="0.5"/>
          <line x1="40" y1="5" x2="65" y2="52" stroke="#8B4513" stroke-width="0.8" opacity="0.5"/>
          <line x1="40" y1="5" x2="75" y2="52" stroke="#8B4513" stroke-width="0.8" opacity="0.5"/>
          <!-- horizontal bands -->
          <path d="M22,30 Q40,24 58,30" stroke="#c0392b" stroke-width="2" fill="none"/>
          <path d="M11,44 Q40,36 69,44" stroke="#c0392b" stroke-width="2" fill="none"/>
          <rect x="5" y="50" width="70" height="5" rx="2" fill="#8B4513"/>
        </svg>
        <span>Jaapi</span>
      </div>

      <div class="icon-item" title="Bihuwan">
        <!-- Bihuwan (scarf / gamusa) SVG -->
        <img class="cult-icon" viewBox="0 0 80 50" src="poly_cotton_gamusa_1-removebg-preview.png">
          
          <rect x="2" y="10" width="76" height="30" rx="3" fill="white" stroke="#c0392b" stroke-width="2"/>
          <!-- red end panels -->
          <rect x="2"  y="10" width="14" height="30" rx="3" fill="#c0392b"/>
          <rect x="64" y="10" width="14" height="30" rx="3" fill="#c0392b"/>
          <!-- white diamond motifs on red ends -->
          <polygon points="9,18 14,25 9,32 4,25" fill="none" stroke="white" stroke-width="1"/>
          <polygon points="71,18 76,25 71,32 66,25" fill="none" stroke="white" stroke-width="1"/>
          <!-- centre horizontal stripes -->
          <rect x="18" y="18" width="44" height="3" fill="#c0392b" opacity="0.3"/>
          <rect x="18" y="29" width="44" height="3" fill="#c0392b" opacity="0.3"/>
        </svg>
        <span>Bihuwan</span>
      </div>
    </div>

    <!-- ── Input form ── -->
    <section class="form-section">
      <label for="userName" class="form-label"></label>
      <div class="input-row">
        <input
          type="text"
          id="userName"
          placeholder="Enter Your Name"
          maxlength="40"
          autocomplete="off"
        />
        <button id="generateBtn" onclick="generateWish()">
          <span>Let's Go</span>
        </button>
      </div>
    </section>

    <!-- ── Wish Output ── -->
    <section class="wish-section" id="wishSection" aria-live="polite">
      <div class="wish-card" id="wishCard">
        <p class="wish-assamese" id="wishAssamese"></p>
        <hr class="wish-divider"/>
        <p class="wish-english"  id="wishEnglish"></p>
        <p class="wish-from"    id="wishFrom"></p>

        <!-- Share button -->
        <button class="share-btn" id="shareBtn" onclick="copyWish()" style="display:none">
          📋 Copy & Share
        </button>
        <p class="copy-toast" id="copyToast">✅ Copied to clipboard!</p>
      </div>
    </section>

<footer class="dev-footer">
  Crafted by 
  <a href="https://samirjsarmah.vercel.app/" target="_blank">
    Samir J Sarmah
  </a>
</footer>

  </main>

  <!-- ════════════════ GAMUSA BORDER BOTTOM ════════════════ -->
  <div class="gamusa-bottom" aria-hidden="true">
    <svg viewBox="0 0 1200 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="60" fill="url(#gamusaPat)"/>
    </svg>
  </div>

  <!-- ════════════════ MUSIC PLAYER ════════════════ -->
  <!-- <div class="music-player" id="musicPlayer">
    <span class="music-label">🎵 Bihu Dhol</span>
    <button class="music-btn" id="musicBtn" onclick="toggleMusic()" title="Play/Pause Bihu music">
      ▶
    </button> -->
  </div>

  <!-- Audio element — using a free royalty-free tone as placeholder -->
  <!-- Replace `src` with actual Bihu instrumental URL or local file -->
<audio id="bihusong" loop preload="auto">
  <source src="bihu.mp3" type="audio/mpeg">
</audio>
    <!--
      Place a Bihu instrumental mp3 here, e.g.:
      <source src="bihu_instrumental.mp3" type="audio/mpeg"/>
      Below we generate a synthesised drum beat via Web Audio API as fallback.
    -->
  </audio>

<button class="calendar-btn" onclick="openCalendar()">
  📅 অসমীয়া কেলেণ্ডাৰ
</button>

    width="100%"

  <script src="script.js"></script>
</body>
</html>
